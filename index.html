<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Philosophical Profile Comparison</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0e0e0e;
  --surface: #161616;
  --surface-raised: #1c1c1c;
  --gold: #c9a84c;
  --gold-dim: #8a7234;
  --text: #e8e4db;
  --text-muted: #8a8680;
  --text-dim: #5a5750;
  --border: rgba(201,168,76,0.12);
  --border-hover: rgba(201,168,76,0.3);
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
}

.page {
  max-width: 640px;
  margin: 0 auto;
  padding: 2.5rem 1.25rem 3rem;
}
@media (max-width: 400px) { .page { padding: 1.75rem 0.875rem 2.5rem; } }

header { text-align: center; margin-bottom: 2.5rem; }
header h1 {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 400;
  font-size: clamp(1.5rem, 5vw, 2rem);
  color: var(--text);
  margin-bottom: 0.4rem;
}
header p {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 1rem;
  color: var(--gold-dim);
}
header .take-quiz {
  display: inline-block;
  margin-top: 1rem;
  padding: 8px 20px;
  border: 1px solid var(--gold-dim);
  border-radius: 100px;
  color: var(--gold);
  font-size: 13px;
  text-decoration: none;
  transition: all 0.2s;
}
header .take-quiz:hover { background: rgba(201,168,76,0.08); border-color: var(--gold); }

.separator {
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
  margin: 1.75rem 0;
}

.controls {
  display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
  margin-bottom: 2rem;
}
.person-btn {
  padding: 8px 16px;
  border-radius: 100px;
  border: 1px solid var(--border);
  background: transparent;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px; font-weight: 500;
  cursor: pointer;
  transition: all 0.2s ease;
  color: var(--text-muted);
  -webkit-user-select: none; user-select: none;
  touch-action: manipulation;
}
.person-btn.active {
  border-color: var(--person-color);
  color: var(--person-color);
  background: rgba(255,255,255,0.03);
}
.person-btn .dot {
  display: inline-block; width: 8px; height: 8px;
  border-radius: 50%; margin-right: 6px;
  vertical-align: middle; opacity: 0.4; transition: opacity 0.2s;
}
.person-btn.active .dot { opacity: 1; }

.category { margin-bottom: 1.75rem; }
.cat-label {
  font-size: 10px; font-weight: 500;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--gold); margin-bottom: 8px;
  display: flex; align-items: center; gap: 8px;
}
.info-btn {
  display: inline-flex; align-items: center; justify-content: center;
  width: 16px; height: 16px; border-radius: 50%;
  border: 1px solid var(--text-dim);
  background: transparent;
  color: var(--text-dim);
  font-size: 10px; font-weight: 500;
  cursor: pointer; transition: all 0.2s;
  font-family: 'DM Sans', sans-serif;
  line-height: 1; padding: 0;
  flex-shrink: 0;
}
.info-btn:hover, .info-btn.active { border-color: var(--gold); color: var(--gold); }

.cat-poles {
  display: flex; justify-content: space-between;
  font-family: 'Cormorant Garamond', serif;
  font-size: 15px; margin-bottom: 4px;
}
.pole { color: var(--text-dim); transition: color 0.2s; }
.pole.bold { color: var(--text); font-weight: 600; }

.track-wrap {
  position: relative; height: 36px;
  display: flex; align-items: center;
}
.track-line {
  position: absolute; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--gold-dim), var(--text-dim));
  opacity: 0.25; border-radius: 1px;
}
.marker {
  position: absolute;
  width: 18px; height: 18px; border-radius: 50%;
  border: 2.5px solid;
  transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  cursor: default; z-index: 2;
}
.marker.hidden {
  opacity: 0;
  transform: translate(-50%, -50%) scale(0);
  pointer-events: none;
}
.marker .tip {
  position: absolute;
  bottom: calc(100% + 8px); left: 50%;
  transform: translateX(-50%);
  background: var(--surface-raised);
  border: 1px solid var(--border-hover);
  border-radius: 6px; padding: 5px 10px;
  font-size: 12px; white-space: nowrap;
  opacity: 0; transition: opacity 0.15s;
  pointer-events: none; color: var(--text); z-index: 20;
}
.marker:hover .tip, .marker.touched .tip { opacity: 1; }
.marker .tip.nudge-right { left: 0; transform: none; }
.marker .tip.nudge-left { left: auto; right: 0; transform: none; }

.track-labels {
  display: none; flex-wrap: wrap;
  gap: 3px 10px; margin-top: 2px; padding-left: 2px;
}
.track-label {
  font-size: 11px; display: flex; align-items: center; gap: 4px;
}
.track-label .tl-dot {
  width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
}
.track-label .tl-name { color: var(--text-muted); }
@media (max-width: 480px) { .track-labels { display: flex; } }

/* Definitions panel */
.def-panel {
  overflow: hidden;
  max-height: 0;
  transition: max-height 0.35s ease, margin 0.35s ease, opacity 0.25s ease;
  opacity: 0;
  margin-top: 0;
}
.def-panel.open {
  max-height: 500px;
  opacity: 1;
  margin-top: 8px;
}
.def-inner {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
}
.def-row {
  margin-bottom: 12px;
}
.def-row:last-child { margin-bottom: 0; }
.def-term {
  font-family: 'Cormorant Garamond', serif;
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 3px;
}
.def-text {
  font-size: 13px;
  line-height: 1.55;
  color: var(--text-muted);
}
.def-link {
  display: inline-block;
  margin-top: 4px;
  font-size: 11px;
  color: var(--gold-dim);
  text-decoration: none;
  transition: color 0.2s;
}
.def-link:hover { color: var(--gold); }
.def-link::after { content: ' \u2192'; }
.def-vs {
  text-align: center;
  font-size: 11px;
  color: var(--text-dim);
  margin: 6px 0;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

/* Stats */
.stats-block {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1.25rem;
  margin-top: 0.5rem;
}
.stats-title {
  font-size: 10px; font-weight: 500;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--gold); margin-bottom: 14px;
}
.pair-row {
  display: flex; align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px; gap: 8px;
}
.pair-row:last-of-type { border-bottom: none; }
.pair-names {
  font-weight: 500; color: var(--text);
  white-space: nowrap; flex-shrink: 0;
}
.pair-bar-wrap {
  flex: 1; height: 3px; border-radius: 2px;
  background: rgba(255,255,255,0.06); min-width: 30px;
}
.pair-bar { height: 100%; border-radius: 2px; transition: width 0.5s ease; }
.pair-score {
  font-size: 12px; color: var(--text-muted);
  white-space: nowrap; flex-shrink: 0;
}

.summary-cards { display: flex; gap: 10px; margin-top: 16px; }
@media (max-width: 380px) { .summary-cards { flex-direction: column; } }

.summary-card {
  flex: 1; min-width: 0;
  background: var(--surface-raised);
  border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 14px;
}
.summary-card-label {
  font-size: 10px; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--text-dim); margin-bottom: 5px;
}
.summary-card-val {
  font-family: 'Cormorant Garamond', serif;
  font-size: 16px; font-weight: 500;
  color: var(--text); margin-bottom: 2px;
}
.summary-card-sub { font-size: 11px; color: var(--text-dim); }
.summary-card.best { border-color: rgba(78,201,160,0.25); }
.summary-card.worst { border-color: rgba(224,75,74,0.2); }

footer {
  text-align: center; margin-top: 2.5rem;
  padding-top: 1.5rem; border-top: 1px solid var(--border);
}
footer p {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic; font-size: 13px; color: var(--text-dim);
}
footer a { color: var(--gold-dim); text-decoration: none; }
footer a:hover { color: var(--gold); }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
.category { animation: fadeUp 0.4s ease both; }
.category:nth-child(1) { animation-delay: 0.05s; }
.category:nth-child(2) { animation-delay: 0.1s; }
.category:nth-child(3) { animation-delay: 0.15s; }
.category:nth-child(4) { animation-delay: 0.2s; }
.category:nth-child(5) { animation-delay: 0.25s; }
.stats-block { animation: fadeUp 0.4s ease 0.35s both; }
</style>
</head>
<body>

<div class="page">
  <header>
    <h1>Philosophical Profile Comparison</h1>
    <p>how you actually think</p>
    <a class="take-quiz" href="https://diagnostic.millermanschool.com" target="_blank" rel="noopener">Take the quiz yourself</a>
  </header>
  <div class="controls" id="controls"></div>
  <div class="separator"></div>
  <div id="categories"></div>
  <div class="separator"></div>
  <div class="stats-block" id="stats"></div>
  <footer>
    <p>Based on the <a href="https://diagnostic.millermanschool.com" target="_blank" rel="noopener">Millerman School diagnostic</a></p>
  </footer>
</div>

<script>
const people = {
  Hussein: { color: '#9b8fd4', scores: { metaphysics: 28, politics: 38, epistemology: 78, technology: 12, human_nature: 80 } },
  Ricardo: { color: '#4ec9a0', scores: { metaphysics: 48, politics: 55, epistemology: 75, technology: 78, human_nature: 60 } },
  Bilal:   { color: '#e07a4f', scores: { metaphysics: 55, politics: 5, epistemology: 35, technology: 50, human_nature: 82 } },
  Dalia:   { color: '#d96b8f', scores: { metaphysics: 65, politics: 55, epistemology: 38, technology: 12, human_nature: 12 } }
};

const catKeys = ['metaphysics','politics','epistemology','technology','human_nature'];

const categories = [
  { key: 'metaphysics', name: 'Metaphysics', left: 'Platonist', right: 'Nietzschean' },
  { key: 'politics', name: 'Politics', left: 'Classical', right: 'Liberal' },
  { key: 'epistemology', name: 'Epistemology', left: 'Straussian', right: 'Hegelian' },
  { key: 'technology', name: 'Technology', left: 'Heideggerian', right: 'Promethean' },
  { key: 'human_nature', name: 'Human nature', left: 'Aristotelian', right: 'Existentialist' }
];

const definitions = {
  metaphysics: {
    left: {
      term: 'Platonist',
      text: 'There\'s a fixed, higher reality beyond what we can see or touch \u2014 eternal truths, objective moral order, a "way things really are" that doesn\'t depend on human opinion.',
      link: 'https://plato.stanford.edu/entries/plato-metaphysics/',
      linkLabel: 'Stanford Encyclopedia: Plato\'s metaphysics'
    },
    right: {
      term: 'Nietzschean',
      text: 'There is no pre-given order or objective truth. "Reality" is something we impose through our will, creativity, and power. Values are made, not found.',
      link: 'https://plato.stanford.edu/entries/nietzsche/',
      linkLabel: 'Stanford Encyclopedia: Nietzsche'
    }
  },
  politics: {
    left: {
      term: 'Classical',
      text: 'Politics should be grounded in virtue, duty, and natural hierarchy. The purpose of the state is to cultivate good character, not just protect individual rights.',
      link: 'https://plato.stanford.edu/entries/aristotle-politics/',
      linkLabel: 'Stanford Encyclopedia: Aristotle\'s politics'
    },
    right: {
      term: 'Liberal',
      text: 'Individual freedom and equal rights come first. Government exists to protect personal liberty, and people should be free to define the good life for themselves.',
      link: 'https://plato.stanford.edu/entries/liberalism/',
      linkLabel: 'Stanford Encyclopedia: Liberalism'
    }
  },
  epistemology: {
    left: {
      term: 'Straussian',
      text: 'The deepest truths are often hidden. Great thinkers wrote between the lines because some knowledge is dangerous or misunderstood by the public. Careful, close reading reveals what\'s really being said.',
      link: 'https://plato.stanford.edu/entries/strauss-leo/',
      linkLabel: 'Stanford Encyclopedia: Leo Strauss'
    },
    right: {
      term: 'Hegelian',
      text: 'Truth unfolds through history as a process of contradiction and resolution. No single perspective is complete \u2014 understanding grows as opposing ideas clash and synthesize over time.',
      link: 'https://plato.stanford.edu/entries/hegel/',
      linkLabel: 'Stanford Encyclopedia: Hegel'
    }
  },
  technology: {
    left: {
      term: 'Heideggerian',
      text: 'Technology isn\'t neutral \u2014 it reshapes how we see the world, turning everything (including people) into resources to be optimized. We should be deeply cautious about what we lose in the process.',
      link: 'https://plato.stanford.edu/entries/heidegger/',
      linkLabel: 'Stanford Encyclopedia: Heidegger'
    },
    right: {
      term: 'Promethean',
      text: 'Technology is humanity\'s greatest tool for liberation. Like Prometheus bringing fire to mortals, our power to build and innovate is what makes us free and defines human progress.',
      link: 'https://en.wikipedia.org/wiki/Prometheanism',
      linkLabel: 'Wikipedia: Prometheanism'
    }
  },
  human_nature: {
    left: {
      term: 'Aristotelian',
      text: 'Humans have a fixed nature with a built-in purpose. Flourishing means developing your natural capacities \u2014 reason, virtue, community \u2014 toward a definite idea of the good life.',
      link: 'https://plato.stanford.edu/entries/aristotle-ethics/',
      linkLabel: 'Stanford Encyclopedia: Aristotle\'s ethics'
    },
    right: {
      term: 'Existentialist',
      text: 'There is no preset human nature. You are what you make of yourself. Existence comes before essence \u2014 meaning isn\'t given, it\'s created through your choices and commitments.',
      link: 'https://plato.stanford.edu/entries/existentialism/',
      linkLabel: 'Stanford Encyclopedia: Existentialism'
    }
  }
};

const names = Object.keys(people);
const active = new Set(names);
let touchedMarker = null;
const openPanels = new Set();

function pairDist(a, b) {
  let sum = 0;
  catKeys.forEach(k => sum += Math.abs(people[a].scores[k] - people[b].scores[k]));
  return sum;
}

function render() {
  const controlsEl = document.getElementById('controls');
  controlsEl.innerHTML = '';
  names.forEach(name => {
    const btn = document.createElement('button');
    btn.className = 'person-btn' + (active.has(name) ? ' active' : '');
    btn.style.setProperty('--person-color', people[name].color);
    btn.innerHTML = '<span class="dot" style="background:' + people[name].color + '"></span>' + name;
    btn.addEventListener('click', () => { active.has(name) ? active.delete(name) : active.add(name); render(); });
    controlsEl.appendChild(btn);
  });

  const catEl = document.getElementById('categories');
  catEl.innerHTML = '';

  categories.forEach(cat => {
    const activeNames = [...active];
    const scores = activeNames.map(n => ({ name: n, val: people[n].scores[cat.key] }));
    scores.sort((a, b) => a.val - b.val);

    const THRESHOLD = 6;
    const offsets = {};
    for (let i = 0; i < scores.length; i++) {
      let cluster = [scores[i]];
      while (i + 1 < scores.length && Math.abs(scores[i + 1].val - scores[i].val) < THRESHOLD) { i++; cluster.push(scores[i]); }
      if (cluster.length === 1) { offsets[cluster[0].name] = 0; }
      else {
        const step = 20;
        const start = -step * (cluster.length - 1) / 2;
        cluster.forEach((c, idx) => offsets[c.name] = start + idx * step);
      }
    }

    const activePoles = activeNames.map(n => people[n].scores[cat.key]);
    const anyLeft = activePoles.some(v => v < 40);
    const anyRight = activePoles.some(v => v > 60);

    const def = definitions[cat.key];
    const panelId = 'def-' + cat.key;
    const isOpen = openPanels.has(cat.key);

    const div = document.createElement('div');
    div.className = 'category';
    div.innerHTML =
      '<div class="cat-label">' + cat.name +
        '<button class="info-btn' + (isOpen ? ' active' : '') + '" data-cat="' + cat.key + '" aria-label="Show definitions">?</button>' +
      '</div>' +
      '<div class="cat-poles">' +
        '<span class="pole' + (anyLeft ? ' bold' : '') + '">' + cat.left + '</span>' +
        '<span class="pole' + (anyRight ? ' bold' : '') + '">' + cat.right + '</span>' +
      '</div>' +
      '<div class="track-wrap"><div class="track-line"></div></div>' +
      '<div class="track-labels"></div>' +
      '<div class="def-panel' + (isOpen ? ' open' : '') + '" id="' + panelId + '">' +
        '<div class="def-inner">' +
          '<div class="def-row">' +
            '<div class="def-term">' + def.left.term + '</div>' +
            '<div class="def-text">' + def.left.text + '</div>' +
            '<a class="def-link" href="' + def.left.link + '" target="_blank" rel="noopener">' + def.left.linkLabel + '</a>' +
          '</div>' +
          '<div class="def-vs">vs</div>' +
          '<div class="def-row">' +
            '<div class="def-term">' + def.right.term + '</div>' +
            '<div class="def-text">' + def.right.text + '</div>' +
            '<a class="def-link" href="' + def.right.link + '" target="_blank" rel="noopener">' + def.right.linkLabel + '</a>' +
          '</div>' +
        '</div>' +
      '</div>';

    catEl.appendChild(div);

    // Info button toggle
    div.querySelector('.info-btn').addEventListener('click', function() {
      const key = this.dataset.cat;
      if (openPanels.has(key)) openPanels.delete(key); else openPanels.add(key);
      const panel = document.getElementById('def-' + key);
      panel.classList.toggle('open');
      this.classList.toggle('active');
    });

    const track = div.querySelector('.track-wrap');
    const labelsRow = div.querySelector('.track-labels');

    names.forEach(name => {
      const data = people[name];
      const isActive = active.has(name);
      const m = document.createElement('div');
      m.className = 'marker' + (isActive ? '' : ' hidden');
      m.style.left = data.scores[cat.key] + '%';
      m.style.background = data.color;
      m.style.borderColor = data.color;
      const yOff = isActive ? (offsets[name] || 0) : 0;
      m.style.transform = 'translate(-50%, calc(-50% + ' + yOff + 'px))';

      const leanLabel = data.scores[cat.key] < 40 ? cat.left : data.scores[cat.key] > 60 ? cat.right : 'Center';
      const tip = document.createElement('div');
      tip.className = 'tip';
      tip.textContent = name + ' \u2014 ' + leanLabel;
      const pct = data.scores[cat.key];
      if (pct < 15) tip.classList.add('nudge-right');
      else if (pct > 85) tip.classList.add('nudge-left');
      m.appendChild(tip);

      m.addEventListener('touchstart', function(e) {
        e.preventDefault();
        if (touchedMarker && touchedMarker !== m) touchedMarker.classList.remove('touched');
        m.classList.toggle('touched');
        touchedMarker = m.classList.contains('touched') ? m : null;
      }, { passive: false });

      track.appendChild(m);

      if (isActive) {
        const lbl = document.createElement('div');
        lbl.className = 'track-label';
        lbl.innerHTML = '<span class="tl-dot" style="background:' + data.color + '"></span><span class="tl-name">' + name + ': ' + leanLabel + '</span>';
        labelsRow.appendChild(lbl);
      }
    });
  });

  renderStats();
}

document.addEventListener('touchstart', function(e) {
  if (touchedMarker && !touchedMarker.contains(e.target)) {
    touchedMarker.classList.remove('touched');
    touchedMarker = null;
  }
});

function renderStats() {
  const el = document.getElementById('stats');
  const activeNames = [...active];
  if (activeNames.length < 2) {
    el.innerHTML = '<div class="stats-title">Compatibility</div><div style="font-size:13px;color:var(--text-dim);">Select at least 2 people.</div>';
    return;
  }

  const pairs = [];
  for (let i = 0; i < activeNames.length; i++)
    for (let j = i + 1; j < activeNames.length; j++)
      pairs.push({ a: activeNames[i], b: activeNames[j], dist: pairDist(activeNames[i], activeNames[j]) });
  pairs.sort((x, y) => x.dist - y.dist);

  const best = pairs[0], worst = pairs[pairs.length - 1];

  function catExtremes(a, b) {
    let maxD = 0, maxC = '', minD = 999, minC = '';
    categories.forEach(c => {
      const d = Math.abs(people[a].scores[c.key] - people[b].scores[c.key]);
      if (d > maxD) { maxD = d; maxC = c.name; }
      if (d < minD) { minD = d; minC = c.name; }
    });
    return { diverge: maxC, align: minC };
  }

  let html = '<div class="stats-title">Compatibility ranking</div>';
  pairs.forEach(p => {
    const compat = Math.round(100 - (p.dist / 500) * 100);
    const barColor = compat > 70 ? '#4ec9a0' : compat > 45 ? '#c9a84c' : '#e24b4a';
    html += '<div class="pair-row">' +
      '<span class="pair-names">' + p.a + ' & ' + p.b + '</span>' +
      '<div class="pair-bar-wrap"><div class="pair-bar" style="width:' + compat + '%;background:' + barColor + ';"></div></div>' +
      '<span class="pair-score">' + compat + '%</span></div>';
  });

  const bestEx = catExtremes(best.a, best.b);
  const worstEx = catExtremes(worst.a, worst.b);

  html += '<div class="summary-cards">' +
    '<div class="summary-card best"><div class="summary-card-label">Most compatible</div>' +
    '<div class="summary-card-val">' + best.a + ' & ' + best.b + '</div>' +
    '<div class="summary-card-sub">Closest on ' + bestEx.align + '</div></div>' +
    '<div class="summary-card worst"><div class="summary-card-label">Most opposed</div>' +
    '<div class="summary-card-val">' + worst.a + ' & ' + worst.b + '</div>' +
    '<div class="summary-card-sub">Diverge on ' + worstEx.diverge + '</div></div></div>';

  el.innerHTML = html;
}
