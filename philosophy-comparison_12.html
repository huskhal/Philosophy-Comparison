<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Philosophical Profile Comparison</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0e0e0e;--surface:#141414;--surface-raised:#1a1a1a;--gold:#c9a84c;--gold-dim:#8a7234;--text:#e8e4db;--text-muted:#8a8680;--text-dim:#5a5750;--border:rgba(201,168,76,.12);--border-hover:rgba(201,168,76,.3)}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent}
.page{max-width:660px;margin:0 auto;padding:2.5rem 1.25rem 3rem}
@media(max-width:400px){.page{padding:1.75rem .875rem 2.5rem}}

header{text-align:center;margin-bottom:1.75rem}
header h1{font-family:'Cormorant Garamond',serif;font-weight:400;font-size:clamp(1.4rem,5vw,2rem);color:var(--text);margin-bottom:.35rem}
header .sub{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.95rem;color:var(--gold-dim)}
header .take-quiz{display:inline-block;margin-top:.9rem;padding:7px 18px;border:1px solid var(--gold-dim);border-radius:100px;color:var(--gold);font-size:12px;text-decoration:none;transition:all .2s}
header .take-quiz:hover{background:rgba(201,168,76,.08);border-color:var(--gold)}

.sep{height:1px;background:linear-gradient(90deg,transparent,var(--gold-dim),transparent);margin:1.5rem 0}
.section-title{font-size:10px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin-bottom:14px}

.controls{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:.75rem}
.pbtn{padding:6px 12px;border-radius:100px;border:1px solid var(--border);background:transparent;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;color:var(--text-muted);-webkit-user-select:none;user-select:none;touch-action:manipulation}
.pbtn.active{border-color:var(--pc);color:var(--pc);background:rgba(255,255,255,.03)}
.pbtn .d{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:5px;vertical-align:middle;opacity:.4;transition:opacity .2s}
.pbtn.active .d{opacity:1}

.legend{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-bottom:1.5rem}
.legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text-muted)}
.legend-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}

.view-toggle{display:flex;justify-content:center;gap:0;margin-bottom:1.5rem}
.vtab{padding:6px 16px;font-size:11px;font-weight:500;border:1px solid var(--border);background:transparent;color:var(--text-dim);cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;letter-spacing:.04em}
.vtab:first-child{border-radius:6px 0 0 6px}
.vtab:last-child{border-radius:0 6px 6px 0;border-left:none}
.vtab.active{background:rgba(201,168,76,.1);color:var(--gold);border-color:var(--gold-dim)}

/* === TRACKS === */
.category{margin-bottom:1.75rem}
.cat-label{font-size:10px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin-bottom:5px;display:flex;align-items:center;gap:8px}
.ibtn{display:inline-flex;align-items:center;justify-content:center;width:15px;height:15px;border-radius:50%;border:1px solid var(--text-dim);background:transparent;color:var(--text-dim);font-size:9px;font-weight:500;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;line-height:1;padding:0;flex-shrink:0}
.ibtn:hover,.ibtn.active{border-color:var(--gold);color:var(--gold)}
.cat-poles{display:flex;justify-content:space-between;font-family:'Cormorant Garamond',serif;font-size:14px;margin-bottom:2px}
.pole{color:var(--text-dim);transition:color .2s}
.pole.bold{color:var(--text);font-weight:600}

/* Beeswarm track */
.bee-track{position:relative;height:42px;margin-top:2px}
.bee-line{position:absolute;left:0;right:0;top:50%;height:1px;background:linear-gradient(90deg,var(--gold-dim),var(--text-dim));opacity:.15}
.bee-tick{position:absolute;top:calc(50% - 3px);width:1px;height:6px;background:rgba(255,255,255,.06)}
.bee-dot{position:absolute;width:11px;height:11px;border-radius:50%;transform:translate(-50%,-50%);cursor:default;transition:all .35s cubic-bezier(.34,1.56,.64,1);z-index:2}
.bee-dot.hid{opacity:0;transform:translate(-50%,-50%) scale(0);pointer-events:none}
.bee-dot:hover{transform:translate(-50%,-50%) scale(1.45);z-index:10}
.bee-dot .tp{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--surface-raised);border:1px solid var(--border-hover);border-radius:5px;padding:3px 7px;font-size:10px;white-space:nowrap;opacity:0;transition:opacity .15s;pointer-events:none;color:var(--text);z-index:20}
.bee-dot:hover .tp,.bee-dot.touched .tp{opacity:1}
.tp.nr{left:0;transform:none}
.tp.nl{left:auto;right:0;transform:none}

/* Definitions */
.dp{overflow:hidden;max-height:0;transition:max-height .35s ease,opacity .25s ease;opacity:0;margin-top:0}
.dp.open{max-height:500px;opacity:1;margin-top:6px}
.di{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 14px}
.dr{margin-bottom:10px}.dr:last-child{margin-bottom:0}
.dt{font-family:'Cormorant Garamond',serif;font-size:14px;font-weight:600;color:var(--text);margin-bottom:2px}
.dd{font-size:12px;line-height:1.5;color:var(--text-muted)}
.dl{display:inline-block;margin-top:3px;font-size:10px;color:var(--gold-dim);text-decoration:none;transition:color .2s}
.dl:hover{color:var(--gold)}.dl::after{content:' \2192'}
.dvs{text-align:center;font-size:10px;color:var(--text-dim);margin:5px 0;letter-spacing:.1em;text-transform:uppercase}

/* === TABLE === */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 -.25rem;padding:0 .25rem}
.tbl{width:100%;border-collapse:collapse;font-size:12px;min-width:500px}
.tbl th{text-align:left;padding:8px 6px;font-weight:500;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--gold);border-bottom:1px solid var(--border-hover);white-space:nowrap}
.tbl td{padding:7px 6px;border-bottom:1px solid var(--border);color:var(--text-muted);white-space:nowrap}
.tbl tr:last-child td{border-bottom:none}
.tbl .name-cell{font-weight:500;color:var(--text);display:flex;align-items:center;gap:5px}
.tbl .name-cell .cd{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.lean-strong{color:var(--text);font-weight:500}
.lean-mod{color:var(--text-muted)}
.lean-center{color:var(--text-dim);font-style:italic}

/* === STATS === */
.stats{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1rem 1.15rem;margin-top:.5rem}
.pr{display:flex;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px;gap:6px;cursor:pointer;transition:background .15s}
.pr:last-of-type{border-bottom:none}
.pr:hover{background:rgba(255,255,255,.015)}
.pn{font-weight:500;color:var(--text);white-space:nowrap;flex-shrink:0;min-width:110px}
@media(max-width:400px){.pn{min-width:90px;font-size:11px}}
.pbw{flex:1;height:3px;border-radius:2px;background:rgba(255,255,255,.06);min-width:20px}
.pb{height:100%;border-radius:2px;transition:width .5s ease}
.ps{font-size:11px;color:var(--text-muted);white-space:nowrap;flex-shrink:0}

.pair-detail{overflow:hidden;max-height:0;opacity:0;transition:max-height .3s ease,opacity .2s ease}
.pair-detail.open{max-height:300px;opacity:1}
.pd-inner{padding:8px 0 6px;display:flex;flex-wrap:wrap;gap:4px 0}
.pd-bar-row{width:100%;display:flex;align-items:center;gap:6px;padding:3px 0}
.pd-cat{font-size:10px;color:var(--text-dim);min-width:85px;text-transform:uppercase;letter-spacing:.06em}
.pd-bar-wrap{flex:1;height:3px;border-radius:2px;background:rgba(255,255,255,.06)}
.pd-bar{height:100%;border-radius:2px}
.pd-val{font-size:10px;color:var(--text-dim);min-width:24px;text-align:right}

.scards{display:flex;gap:8px;margin-top:12px}
@media(max-width:400px){.scards{flex-direction:column}}
.sc{flex:1;min-width:0;background:var(--surface-raised);border:1px solid var(--border);border-radius:8px;padding:10px 12px}
.sc-l{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);margin-bottom:4px}
.sc-v{font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:500;color:var(--text);margin-bottom:1px}
.sc-s{font-size:10px;color:var(--text-dim)}
.sc.best{border-color:rgba(78,201,160,.25)}
.sc.worst{border-color:rgba(224,75,74,.2)}

footer{text-align:center;margin-top:2rem;padding-top:1.25rem;border-top:1px solid var(--border)}
footer p{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:12px;color:var(--text-dim)}
footer a{color:var(--gold-dim);text-decoration:none}
footer a:hover{color:var(--gold)}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.category{animation:fadeUp .35s ease both}
.category:nth-child(1){animation-delay:.03s}.category:nth-child(2){animation-delay:.06s}
.category:nth-child(3){animation-delay:.09s}.category:nth-child(4){animation-delay:.12s}
.category:nth-child(5){animation-delay:.15s}
.stats{animation:fadeUp .35s ease .2s both}
</style>
</head>
<body>
<div class="page">
  <header>
    <h1>Philosophical Profile Comparison</h1>
    <p class="sub">how you actually think</p>
    <a class="take-quiz" href="https://diagnostic.millermanschool.com" target="_blank" rel="noopener">Take the quiz yourself</a>
  </header>
  <div class="controls" id="ctrls"></div>
  <div class="legend" id="legend"></div>
  <div class="view-toggle">
    <button class="vtab active" data-v="tracks">Tracks</button>
    <button class="vtab" data-v="table">Table</button>
  </div>
  <div id="tracks-view"></div>
  <div id="table-view" style="display:none"></div>
  <div class="sep"></div>
  <div class="stats" id="stats"></div>
  <footer><p>Based on the <a href="https://diagnostic.millermanschool.com" target="_blank" rel="noopener">Millerman School diagnostic</a></p></footer>
</div>

<script>
const P={
  Hussein:{c:'#9b8fd4',s:{m:28,p:38,e:78,t:12,h:80}},
  Ricardo:{c:'#4ec9a0',s:{m:48,p:55,e:75,t:78,h:60}},
  Bilal:{c:'#e07a4f',s:{m:55,p:5,e:35,t:50,h:82}},
  Dalia:{c:'#d96b8f',s:{m:65,p:55,e:38,t:12,h:12}},
  Anthony:{c:'#6cb4d9',s:{m:55,p:28,e:75,t:12,h:12}},
  Elisa:{c:'#b8a0d2',s:{m:55,p:38,e:52,t:12,h:12}},
  Line:{c:'#e8c95a',s:{m:72,p:35,e:75,t:82,h:82}}
};
const CK=['m','p','e','t','h'];
const cats=[
  {k:'m',name:'Metaphysics',l:'Platonist',r:'Nietzschean'},
  {k:'p',name:'Politics',l:'Classical',r:'Liberal'},
  {k:'e',name:'Epistemology',l:'Straussian',r:'Hegelian'},
  {k:'t',name:'Technology',l:'Heideggerian',r:'Promethean'},
  {k:'h',name:'Human nature',l:'Aristotelian',r:'Existentialist'}
];
const defs={
  m:{l:{t:'Platonist',d:"There's a fixed, higher reality beyond what we see \u2014 eternal truths and objective moral order that don't depend on human opinion.",u:'https://plato.stanford.edu/entries/plato-metaphysics/',ul:"Stanford: Plato's metaphysics"},r:{t:'Nietzschean',d:'"Reality" is something we impose through will and creativity. Values are made, not found.',u:'https://plato.stanford.edu/entries/nietzsche/',ul:'Stanford: Nietzsche'}},
  p:{l:{t:'Classical',d:"Politics should be grounded in virtue, duty, and natural hierarchy. The state's purpose is to cultivate good character, not just protect rights.",u:'https://plato.stanford.edu/entries/aristotle-politics/',ul:"Stanford: Aristotle's politics"},r:{t:'Liberal',d:'Individual freedom and equal rights come first. People should be free to define the good life for themselves.',u:'https://plato.stanford.edu/entries/liberalism/',ul:'Stanford: Liberalism'}},
  e:{l:{t:'Straussian',d:"The deepest truths are often hidden. Great thinkers wrote between the lines \u2014 careful, close reading reveals what's really being said.",u:'https://plato.stanford.edu/entries/strauss-leo/',ul:'Stanford: Leo Strauss'},r:{t:'Hegelian',d:'Truth unfolds through history as contradiction and resolution. Understanding grows as opposing ideas clash and synthesize over time.',u:'https://plato.stanford.edu/entries/hegel/',ul:'Stanford: Hegel'}},
  t:{l:{t:'Heideggerian',d:"Technology isn't neutral \u2014 it reshapes how we see the world, turning everything into resources to optimize. We should be cautious about what we lose.",u:'https://plato.stanford.edu/entries/heidegger/',ul:'Stanford: Heidegger'},r:{t:'Promethean',d:"Technology is humanity's greatest tool for liberation. Our power to build and innovate defines human progress.",u:'https://en.wikipedia.org/wiki/Prometheanism',ul:'Wikipedia: Prometheanism'}},
  h:{l:{t:'Aristotelian',d:'Humans have a fixed nature with a built-in purpose. Flourishing means developing reason, virtue, and community toward a definite good life.',u:'https://plato.stanford.edu/entries/aristotle-ethics/',ul:"Stanford: Aristotle's ethics"},r:{t:'Existentialist',d:"There is no preset human nature. Existence precedes essence \u2014 meaning isn't given, it's created through your choices.",u:'https://plato.stanford.edu/entries/existentialism/',ul:'Stanford: Existentialism'}}
};

const names=Object.keys(P);
const active=new Set(names);
let touchedMk=null;
const openDefs=new Set(),openPairs=new Set();

function leanLabel(v,cat){return v<40?cat.l:v>60?cat.r:'Center'}
function leanClass(v){return v<30||v>70?'lean-strong':v<40||v>60?'lean-mod':'lean-center'}
function dist(a,b){let s=0;CK.forEach(k=>s+=Math.abs(P[a].s[k]-P[b].s[k]));return s}
function catDist(a,b,k){return Math.abs(P[a].s[k]-P[b].s[k])}

// Beeswarm layout: place dots along x, nudge y only to avoid overlap
function beeswarm(items, dotR, trackW) {
  // items: [{name, val}], sorted by val
  // Returns [{name, x, y}] where y=0 is the center line
  const placed = [];
  const diameter = dotR * 2 + 2; // dot diameter + gap

  items.forEach(item => {
    const x = (item.val / 100) * trackW;
    let y = 0;
    let placed_ok = false;

    // Try y=0 first, then alternate above/below
    for (let attempts = 0; attempts < 20; attempts++) {
      const tryY = attempts === 0 ? 0 : (Math.ceil(attempts/2) * diameter * (attempts % 2 === 1 ? -1 : 1));
      let collision = false;
      for (const p of placed) {
        const dx = x - p.x;
        const dy = tryY - p.y;
        if (Math.sqrt(dx*dx + dy*dy) < diameter) { collision = true; break; }
      }
      if (!collision) { y = tryY; placed_ok = true; break; }
    }
    placed.push({ name: item.name, x, y });
  });

  return placed;
}

function render(){
  const ce=document.getElementById('ctrls');ce.innerHTML='';
  names.forEach(n=>{
    const b=document.createElement('button');
    b.className='pbtn'+(active.has(n)?' active':'');
    b.style.setProperty('--pc',P[n].c);
    b.innerHTML='<span class="d" style="background:'+P[n].c+'"></span>'+n;
    b.onclick=()=>{active.has(n)?active.delete(n):active.add(n);render()};
    ce.appendChild(b);
  });

  const le=document.getElementById('legend');le.innerHTML='';
  [...active].forEach(n=>{
    const item=document.createElement('div');item.className='legend-item';
    item.innerHTML='<div class="legend-dot" style="background:'+P[n].c+'"></div>'+n;
    le.appendChild(item);
  });

  renderTracks();renderTable();renderStats();
}

function renderTracks(){
  const el=document.getElementById('tracks-view');el.innerHTML='';
  const activeList=[...active];

  cats.forEach(cat=>{
    const ap=activeList.map(n=>P[n].s[cat.k]);
    const aL=ap.some(v=>v<40),aR=ap.some(v=>v>60);
    const df=defs[cat.k],isO=openDefs.has(cat.k);

    const d=document.createElement('div');d.className='category';
    d.innerHTML=
      '<div class="cat-label">'+cat.name+'<button class="ibtn'+(isO?' active':'')+'" data-c="'+cat.k+'">?</button></div>'+
      '<div class="cat-poles"><span class="pole'+(aL?' bold':'')+'">'+cat.l+'</span><span class="pole'+(aR?' bold':'')+'">'+cat.r+'</span></div>'+
      '<div class="bee-track" id="bt-'+cat.k+'">'+
        '<div class="bee-line"></div>'+
        '<div class="bee-tick" style="left:25%"></div>'+
        '<div class="bee-tick" style="left:50%"></div>'+
        '<div class="bee-tick" style="left:75%"></div>'+
      '</div>'+
      '<div class="dp'+(isO?' open':'')+'" id="dp-'+cat.k+'"><div class="di">'+
        '<div class="dr"><div class="dt">'+df.l.t+'</div><div class="dd">'+df.l.d+'</div><a class="dl" href="'+df.l.u+'" target="_blank" rel="noopener">'+df.l.ul+'</a></div>'+
        '<div class="dvs">vs</div>'+
        '<div class="dr"><div class="dt">'+df.r.t+'</div><div class="dd">'+df.r.d+'</div><a class="dl" href="'+df.r.u+'" target="_blank" rel="noopener">'+df.r.ul+'</a></div>'+
      '</div></div>';
    el.appendChild(d);

    d.querySelector('.ibtn').onclick=function(){
      const k=this.dataset.c;
      openDefs.has(k)?openDefs.delete(k):openDefs.add(k);
      document.getElementById('dp-'+k).classList.toggle('open');
      this.classList.toggle('active');
    };

    // Compute beeswarm positions after element is in DOM
    requestAnimationFrame(()=>{
      const track=document.getElementById('bt-'+cat.k);
      const trackW=track.offsetWidth;
      const dotR=5.5; // half of 11px

      const items=activeList.map(n=>({name:n,val:P[n].s[cat.k]})).sort((a,b)=>a.val-b.val);
      const positions=beeswarm(items,dotR,trackW);

      // Compute needed height
      let minY=0,maxY=0;
      positions.forEach(p=>{if(p.y<minY)minY=p.y;if(p.y>maxY)maxY=p.y});
      const totalH=Math.max(42, (maxY-minY)+dotR*2+16);
      track.style.height=totalH+'px';
      // Reposition center line
      const centerY=totalH/2;
      track.querySelector('.bee-line').style.top=centerY+'px';
      track.querySelectorAll('.bee-tick').forEach(tk=>{
        tk.style.top=(centerY-3)+'px';
      });

      positions.forEach(pos=>{
        const dot=document.createElement('div');
        dot.className='bee-dot';
        dot.style.left=pos.x+'px';
        dot.style.top=(centerY+pos.y)+'px';
        dot.style.background=P[pos.name].c;

        const ll=leanLabel(P[pos.name].s[cat.k],cat);
        let tipClass='tp';
        const pct=P[pos.name].s[cat.k];
        if(pct<12)tipClass+=' nr';else if(pct>88)tipClass+=' nl';

        const tp=document.createElement('div');
        tp.className=tipClass;
        tp.textContent=pos.name+' \u2014 '+ll;
        dot.appendChild(tp);

        dot.addEventListener('touchstart',function(e){
          e.preventDefault();
          if(touchedMk&&touchedMk!==dot)touchedMk.classList.remove('touched');
          dot.classList.toggle('touched');
          touchedMk=dot.classList.contains('touched')?dot:null;
        },{passive:false});

        track.appendChild(dot);
      });
    });
  });
}

function renderTable(){
  const el=document.getElementById('table-view');
  const an=[...active];
  if(!an.length){el.innerHTML='<p style="font-size:13px;color:var(--text-dim);text-align:center;">Select at least 1 person.</p>';return}
  let h='<div class="tbl-wrap"><table class="tbl"><thead><tr><th>Person</th>';
  cats.forEach(c=>h+='<th>'+c.name+'</th>');
  h+='</tr></thead><tbody>';
  an.forEach(n=>{
    h+='<tr><td><div class="name-cell"><span class="cd" style="background:'+P[n].c+'"></span>'+n+'</div></td>';
    cats.forEach(c=>{const v=P[n].s[c.k],ll=leanLabel(v,c),lc=leanClass(v);h+='<td class="lean '+lc+'">'+ll+'</td>'});
    h+='</tr>';
  });
  h+='</tbody></table></div>';el.innerHTML=h;
}

function renderStats(){
  const el=document.getElementById('stats');
  const an=[...active];
  if(an.length<2){el.innerHTML='<div class="section-title">Compatibility</div><p style="font-size:12px;color:var(--text-dim);">Select at least 2 people.</p>';return}

  const pairs=[];
  for(let i=0;i<an.length;i++)for(let j=i+1;j<an.length;j++)pairs.push({a:an[i],b:an[j],d:dist(an[i],an[j])});
  pairs.sort((x,y)=>x.d-y.d);
  const best=pairs[0],worst=pairs[pairs.length-1];

  function extremes(a,b){let xD=0,xC='',nD=999,nC='';cats.forEach(c=>{const d=catDist(a,b,c.k);if(d>xD){xD=d;xC=c.name}if(d<nD){nD=d;nC=c.name}});return{div:xC,al:nC}}

  let h='<div class="section-title">Compatibility ranking</div><p style="font-size:11px;color:var(--text-dim);margin:-8px 0 12px;">Tap a pair to see per-category breakdown</p>';
  pairs.forEach(p=>{
    const compat=Math.round(100-(p.d/500)*100);
    const bc=compat>70?'#4ec9a0':compat>45?'#c9a84c':'#e24b4a';
    const pid=p.a+'-'+p.b;
    const isOpen=openPairs.has(pid);
    h+='<div class="pr" data-pid="'+pid+'"><span class="pn">'+p.a+' & '+p.b+'</span><div class="pbw"><div class="pb" style="width:'+compat+'%;background:'+bc+';"></div></div><span class="ps">'+compat+'%</span></div>';
    h+='<div class="pair-detail'+(isOpen?' open':'')+'" id="pd-'+pid+'"><div class="pd-inner">';
    cats.forEach(c=>{
      const cd=catDist(p.a,p.b,c.k),cc=Math.round(100-cd),cbc=cc>70?'#4ec9a0':cc>45?'#c9a84c':'#e24b4a';
      h+='<div class="pd-bar-row"><span class="pd-cat">'+c.name+'</span><div class="pd-bar-wrap"><div class="pd-bar" style="width:'+cc+'%;background:'+cbc+';"></div></div><span class="pd-val">'+cc+'%</span></div>';
    });
    h+='</div></div>';
  });

  const be=extremes(best.a,best.b),we=extremes(worst.a,worst.b);
  h+='<div class="scards"><div class="sc best"><div class="sc-l">Most compatible</div><div class="sc-v">'+best.a+' & '+best.b+'</div><div class="sc-s">Closest on '+be.al+'</div></div><div class="sc worst"><div class="sc-l">Most opposed</div><div class="sc-v">'+worst.a+' & '+worst.b+'</div><div class="sc-s">Diverge on '+we.div+'</div></div></div>';

  el.innerHTML=h;
  el.querySelectorAll('.pr').forEach(row=>{
    row.addEventListener('click',function(){
      const pid=this.dataset.pid,detail=document.getElementById('pd-'+pid);
      if(openPairs.has(pid)){openPairs.delete(pid);detail.classList.remove('open')}
      else{openPairs.add(pid);detail.classList.add('open')}
    });
  });
}

document.querySelectorAll('.vtab').forEach(tab=>{
  tab.addEventListener('click',function(){
    document.querySelectorAll('.vtab').forEach(t=>t.classList.remove('active'));
    this.classList.add('active');
    const v=this.dataset.v;
    document.getElementById('tracks-view').style.display=v==='tracks'?'':'none';
    document.getElementById('table-view').style.display=v==='table'?'':'none';
  });
});

document.addEventListener('touchstart',function(e){
  if(touchedMk&&!touchedMk.contains(e.target)){touchedMk.classList.remove('touched');touchedMk=null}
});

render();
</script>
</body>
</html>
